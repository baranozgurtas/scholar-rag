# Production stack: API + Qdrant + Langfuse (+postgres for Langfuse).
# Ollama runs on the HOST on Apple Silicon (Metal GPU acceleration) —
# the API reaches it via host.docker.internal:11434 inside Docker Desktop.
#
# Bring up:    docker compose up -d
# Tear down:   docker compose down  (add `-v` to wipe volumes)
# Status:      docker compose ps
# Logs:        docker compose logs -f api

services:
  # ─── Vector store ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", ":> /dev/tcp/127.0.0.1/6333 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Langfuse self-hosted ────────────────────────────────────
  langfuse-db:
    image: postgres:16-alpine
    container_name: rag-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    container_name: rag-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: change-me-in-production
      SALT: change-me-in-production
      NEXTAUTH_URL: http://localhost:3001
      TELEMETRY_ENABLED: "false"
      LANGFUSE_DEFAULT_PROJECT_ROLE: ADMIN

  # ─── API ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Containers reach the host's Ollama at this address
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      QDRANT_URL: "http://qdrant:6333"
      LANGFUSE_HOST: "http://langfuse:3000"
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    extra_hosts:
      # Required on Linux for host.docker.internal to resolve;
      # no-op on Docker Desktop for Mac (host.docker.internal works natively)
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./eval/results:/app/eval/results

volumes:
  qdrant_storage:
  langfuse_db:
